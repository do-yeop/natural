<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>등고선 쌓기 - 산지 부스</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #8fd3e8;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
  }
  #game { display: block; width: 100vw; height: 100vh; touch-action: none; }

  #hud {
    position: fixed; top: 0; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 12px 14px; pointer-events: none; z-index: 5;
  }
  .panel {
    background: rgba(255,255,255,0.82);
    border-radius: 14px; padding: 6px 14px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    text-align: center;
  }
  .label { font-size: 13px; color: #5e4a28; font-weight: 700; }
  .value { font-size: 26px; color: #3f2f14; font-weight: 900; line-height: 1.1; }
  .value small { font-size: 14px; }

  .overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: rgba(35, 55, 75, 0.55); color: #fff; text-align: center;
    padding: 22px;
  }
  .overlay.hidden { display: none; }
  .card {
    background: rgba(255,255,255,0.96); color: #3a2e18;
    border-radius: 24px; padding: 28px 30px; max-width: 440px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .card h1 { font-size: 32px; margin-bottom: 6px; color: #5e3f17; }
  .card .emoji { font-size: 48px; margin-bottom: 6px; }
  .card p { font-size: 18px; line-height: 1.55; margin-bottom: 10px; color: #574733; }
  .card .big { font-size: 44px; font-weight: 900; color: #2e7d32; margin: 6px 0; }
  .btn {
    display: inline-block; margin-top: 14px;
    background: #2e7d32; color: #fff; border: none;
    font-size: 23px; font-weight: 800; padding: 15px 44px;
    border-radius: 999px; cursor: pointer;
    box-shadow: 0 5px 0 #1b5e20; transition: transform .05s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #1b5e20; }
  .hint { margin-top: 12px; font-size: 15px; color: #7a6a52; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="panel">
    <div class="label">현재 높이</div>
    <div class="value"><span id="curHeight">0</span><small> m</small></div>
  </div>
  <div class="panel">
    <div class="label">🏆 최고 등고선</div>
    <div class="value"><span id="bestHeight">0</span><small> m</small></div>
  </div>
</div>

<div class="overlay" id="startScreen">
  <div class="card">
    <div class="emoji">⛰️</div>
    <h1>등고선 쌓기</h1>
    <p>블럭이 위에서 좌우로 움직여요.<br><b>화면을 탭</b>하면 아래로 떨어집니다!</p>
    <p>아래 블럭과 <b>딱 맞게</b> 쌓을수록<br>산이 더 높아져요.</p>
    <p>도달한 <b>최고 높이 = 나의 등고선</b> 🗻</p>
    <p style="font-size:16px;color:#2e7d32;">높이 올라갈수록 색이 변해요:<br><b>초록(낮은 땅) → 갈색(높은 산) → 눈 ⛄</b></p>
    <button class="btn" id="startBtn">시작하기</button>
    <div class="hint">정확히 겹치면 보너스! 삐져나오면 잘려요.</div>
  </div>
</div>

<div class="overlay hidden" id="overScreen">
  <div class="card">
    <div class="emoji">🗻</div>
    <h1>도착!</h1>
    <p>이번에 만든 산의 높이</p>
    <div class="big"><span id="finalHeight">0</span> m</div>
    <p id="recordMsg"></p>
    <button class="btn" id="retryBtn">다시 하기</button>
    <div class="hint">친구와 누가 더 높은 등고선을 만드는지 겨뤄봐요!</div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
  var W = 0, H = 0, COL_W = 0, colLeft = 0, colRight = 0;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    // 세로로 긴 좁은 기둥 (가로폭 제한)
    COL_W = Math.min(W * 0.9, 420);
    colLeft = (W - COL_W) / 2;
    colRight = colLeft + COL_W;
  }
  window.addEventListener("resize", resize);
  resize();

  // ---- 설정 ----
  var BLOCK_H = 42;
  var METERS_PER_BLOCK = 20;
  var GRAV = 1.5;

  // 단채식 지형도 색: 저지대 초록 → 노랑 → 갈색 → 진갈색 → 정상 눈
  var ELEV_STOPS = [
    [0,    [95, 168, 63]],   // 초록 (평지/저지대)
    [200,  [155, 192, 72]],  // 연두
    [400,  [226, 206, 112]], // 노랑
    [600,  [206, 156, 86]],  // 황갈색
    [800,  [162, 108, 58]],  // 갈색
    [1000, [116, 76, 43]],   // 진갈색 (고지대)
    [1300, [232, 232, 236]]  // 정상 눈 (흰색)
  ];
  function colorAt(meters) {
    var s = ELEV_STOPS;
    if (meters <= s[0][0]) return s[0][1].slice();
    for (var i = 1; i < s.length; i++) {
      if (meters <= s[i][0]) {
        var t = (meters - s[i - 1][0]) / (s[i][0] - s[i - 1][0]);
        var a = s[i - 1][1], b = s[i][1];
        return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
      }
    }
    return s[s.length - 1][1].slice();
  }
  function shade(c, f) {
    return "rgb(" + Math.min(255, Math.round(c[0] * f)) + "," +
      Math.min(255, Math.round(c[1] * f)) + "," + Math.min(255, Math.round(c[2] * f)) + ")";
  }

  var state = "start"; // start | aiming | falling | over
  var blocks = [];
  var moving = null;
  var falling = null;
  var debris = [];
  var cameraY = 0, targetCameraY = 0;
  var dir = 1, speed = 3.7, heightCount = 0, best = 0;
  var perfectStreak = 0, flash = 0, shake = 0;

  try { best = parseInt(localStorage.getItem("contourBest") || "0", 10) || 0; } catch (e) { best = 0; }
  document.getElementById("bestHeight").textContent = best;

  function groundY() { return H - 150; }
  function worldTop(i) { return groundY() - i * BLOCK_H; }
  function landScreenY() { return H * 0.58; }
  function dropTopY() { return Math.max(70, H * 0.16); }

  function newGame() {
    blocks = []; debris = []; falling = null;
    heightCount = 0; speed = 3.7; perfectStreak = 0; flash = 0; shake = 0;
    var w = COL_W * 0.72;
    blocks.push({ x: (W - w) / 2, w: w, color: colorAt(0) });
    targetCameraY = worldTop(0) - landScreenY();
    cameraY = targetCameraY;
    spawnMoving();
    state = "aiming";
    updateHUD();
  }

  function spawnMoving() {
    var top = blocks[blocks.length - 1];
    // 이 블럭이 놓일 높이에 맞는 등고선 색
    var color = colorAt(blocks.length * METERS_PER_BLOCK);
    var fromLeft = (blocks.length % 2 === 0);
    moving = { x: fromLeft ? colLeft : colRight - top.w, w: top.w, color: color };
    dir = fromLeft ? 1 : -1;
  }

  function drop() {
    if (state !== "aiming" || !moving) return;
    var top = blocks[blocks.length - 1];
    var x = moving.x;
    var left = Math.max(x, top.x), right = Math.min(x + moving.w, top.x + top.w);
    var overlap = right - left;
    var fb = {
      x: x, w: moving.w, color: moving.color,
      y: cameraY + dropTopY(), vy: 7,
      miss: overlap <= 4,
      targetY: worldTop(blocks.length - 1) - BLOCK_H
    };
    falling = fb; moving = null; state = "falling";
  }

  function resolveLanding(fb) {
    var top = blocks[blocks.length - 1];
    var x = fb.x;
    var left = Math.max(x, top.x), right = Math.min(x + fb.w, top.x + top.w);
    var overlap = right - left;
    var off = Math.abs(x - top.x);

    // "딱 맞음" 판정 (적당한 난이도)
    var snap = Math.max(15, top.w * 0.10);
    if (off < snap) {
      // 딱 맞음
      x = top.x; perfectStreak++; flash = 1;
    } else {
      perfectStreak = 0;
      // 삐져나온 조각 잘라 떨어뜨리기
      if (x < top.x) {
        debris.push({ x: x, w: top.x - x, color: fb.color, y: fb.targetY, vy: 1, vx: -2.5 });
      } else {
        debris.push({ x: right, w: (x + fb.w) - right, color: fb.color, y: fb.targetY, vy: 1, vx: 2.5 });
      }
      x = left; fb.w = overlap;
    }

    blocks.push({ x: x, w: fb.w, color: fb.color });
    heightCount++;
    speed = Math.min(7.0, 3.7 + heightCount * 0.06);
    shake = 6;
    targetCameraY = worldTop(blocks.length - 1) - landScreenY();
    updateHUD();
    spawnMoving();
    state = "aiming";
  }

  function endGame() {
    state = "over";
    var meters = heightCount * METERS_PER_BLOCK;
    document.getElementById("finalHeight").textContent = meters;
    var msg;
    if (meters > best) {
      best = meters;
      try { localStorage.setItem("contourBest", String(best)); } catch (e) {}
      document.getElementById("bestHeight").textContent = best;
      msg = "🎉 새로운 최고 등고선 기록!";
    } else {
      msg = "최고 기록: " + best + " m";
    }
    document.getElementById("recordMsg").textContent = msg;
    document.getElementById("overScreen").classList.remove("hidden");
  }

  function updateHUD() {
    document.getElementById("curHeight").textContent = heightCount * METERS_PER_BLOCK;
  }

  // ---- 입력 ----
  function handleTap(e) { if (state === "aiming") { e.preventDefault(); drop(); } }
  canvas.addEventListener("pointerdown", handleTap);
  window.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.code === "Enter") handleTap(e);
  });
  document.getElementById("startBtn").addEventListener("click", function () {
    document.getElementById("startScreen").classList.add("hidden"); newGame();
  });
  document.getElementById("retryBtn").addEventListener("click", function () {
    document.getElementById("overScreen").classList.add("hidden"); newGame();
  });

  // ---- 그리기 헬퍼 ----
  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawBlock(b, y) {
    var c = b.color;
    // 본체 (등고선 색)
    ctx.fillStyle = shade(c, 1);
    roundRect(b.x, y, b.w, BLOCK_H, 7); ctx.fill();
    // 아래 그림자 지층
    ctx.fillStyle = shade(c, 0.78);
    ctx.fillRect(b.x + 5, y + BLOCK_H - 10, b.w - 10, 7);
    // 점박이 (질감)
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(b.x + b.w * 0.25, y + BLOCK_H * 0.55, 5, 4);
    ctx.fillRect(b.x + b.w * 0.6, y + BLOCK_H * 0.42, 4, 4);
    // 윗면 밝은 띠 (등고선 단)
    ctx.fillStyle = shade(c, 1.16);
    roundRect(b.x, y, b.w, 10, 7); ctx.fill();
    ctx.fillRect(b.x, y + 6, b.w, 5);
    // 하이라이트
    ctx.fillStyle = "rgba(255,255,255,0.22)";
    ctx.fillRect(b.x + 6, y + 3, b.w - 12, 3);
  }

  function drawTree(x, baseY, s) {
    // 줄기
    ctx.fillStyle = "#7a4f28";
    ctx.fillRect(x - 3 * s, baseY - 12 * s, 6 * s, 14 * s);
    // 잎 (삼각형 3단)
    ctx.fillStyle = "#3f8f43";
    for (var i = 0; i < 3; i++) {
      var ty = baseY - 12 * s - i * 12 * s;
      var tw = (20 - i * 4) * s;
      ctx.beginPath();
      ctx.moveTo(x, ty - 18 * s);
      ctx.lineTo(x - tw, ty);
      ctx.lineTo(x + tw, ty);
      ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.beginPath();
    ctx.moveTo(x, baseY - 12 * s - 2 * 12 * s - 18 * s);
    ctx.lineTo(x - 4 * s, baseY - 12 * s - 2 * 12 * s - 8 * s);
    ctx.lineTo(x + 2 * s, baseY - 12 * s - 2 * 12 * s - 10 * s);
    ctx.closePath(); ctx.fill();
  }

  function drawMountain(cx, baseY, w, h, color, snow) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(cx, baseY - h);
    ctx.lineTo(cx - w, baseY);
    ctx.lineTo(cx + w, baseY);
    ctx.closePath(); ctx.fill();
    if (snow) {
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.beginPath();
      ctx.moveTo(cx, baseY - h);
      ctx.lineTo(cx - w * 0.28, baseY - h * 0.66);
      ctx.lineTo(cx - w * 0.12, baseY - h * 0.74);
      ctx.lineTo(cx + w * 0.05, baseY - h * 0.64);
      ctx.lineTo(cx + w * 0.2, baseY - h * 0.72);
      ctx.lineTo(cx + w * 0.3, baseY - h * 0.64);
      ctx.closePath(); ctx.fill();
    }
  }

  function drawBackground() {
    var g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#aee3f2");
    g.addColorStop(0.6, "#d7f0ea");
    g.addColorStop(1, "#eaf7df");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // 해 (구석)
    ctx.fillStyle = "rgba(255,236,150,0.9)";
    ctx.beginPath(); ctx.arc(W - 60, 90, 34, 0, 7); ctx.fill();

    // 배경 산맥 (고정 배경, 화면 좌표)
    var horizon = H * 0.7;
    drawMountain(W * 0.2, horizon, W * 0.34, H * 0.32, "#bcd4c0", false);
    drawMountain(W * 0.82, horizon, W * 0.32, H * 0.28, "#bcd4c0", false);
    drawMountain(W * 0.5, horizon, W * 0.42, H * 0.44, "#a9c6ad", true);

    // 구름
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    cloud(W * 0.25, 70); cloud(W * 0.7, 150);
  }
  function cloud(cx, cy) {
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, 7); ctx.arc(cx + 20, cy + 5, 14, 0, 7);
    ctx.arc(cx - 20, cy + 5, 14, 0, 7); ctx.arc(cx, cy + 11, 22, 0, 7);
    ctx.fill();
  }

  function drawGroundAndTrees() {
    // 지면 (월드 좌표 → 기둥이 자라면 아래로 사라짐 = 고도감)
    var gy = worldTop(0) + BLOCK_H - cameraY; // 베이스 블럭 바로 아래
    if (gy < H + 60) {
      ctx.fillStyle = "#79b84a";
      ctx.fillRect(0, gy, W, H - gy + 80);
      ctx.fillStyle = "#5fa33a";
      ctx.fillRect(0, gy, W, 10);
      // 나무들 (기둥 양옆)
      drawTree(colLeft - 40, gy + 4, 1.5);
      drawTree(colLeft - 95, gy + 16, 1.1);
      drawTree(colRight + 40, gy + 4, 1.5);
      drawTree(colRight + 95, gy + 16, 1.1);
      drawTree(W * 0.12, gy + 30, 1.8);
      drawTree(W * 0.88, gy + 30, 1.8);
    }
  }

  function drawContourLines() {
    ctx.save();
    ctx.font = "bold 13px sans-serif";
    ctx.textBaseline = "middle";
    for (var i = 0; i <= heightCount + 18; i++) {
      var y = worldTop(i) - cameraY;
      if (y < -20 || y > H + 20) continue;
      var big = (i % 5 === 0);
      ctx.strokeStyle = big ? "rgba(110,80,45,0.4)" : "rgba(110,80,45,0.15)";
      ctx.lineWidth = big ? 2 : 1;
      ctx.setLineDash([6, 8]);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      if (big && i > 0) {
        ctx.setLineDash([]);
        ctx.fillStyle = "rgba(85,60,28,0.8)";
        ctx.fillText(i * METERS_PER_BLOCK + " m", 8, y - 11);
      }
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  function loop() {
    cameraY += (targetCameraY - cameraY) * 0.14;
    if (shake > 0) shake *= 0.85;
    if (flash > 0) flash -= 0.05;

    // 움직이는 블럭
    if (state === "aiming" && moving) {
      moving.x += speed * dir;
      if (moving.x < colLeft) { moving.x = colLeft; dir = 1; }
      if (moving.x + moving.w > colRight) { moving.x = colRight - moving.w; dir = -1; }
    }

    // 떨어지는 블럭
    if (state === "falling" && falling) {
      falling.vy += GRAV; falling.y += falling.vy;
      if (falling.miss) {
        if (falling.y - cameraY > H + 250) { falling = null; endGame(); }
      } else if (falling.y >= falling.targetY) {
        falling.y = falling.targetY;
        var f = falling; falling = null; resolveLanding(f);
      }
    }

    // 잘린 조각
    for (var i = debris.length - 1; i >= 0; i--) {
      var d = debris[i];
      d.vy += GRAV; d.y += d.vy; d.x += d.vx;
      if (d.y - cameraY > H + 250) debris.splice(i, 1);
    }

    // ---- 렌더 ----
    ctx.save();
    if (shake > 0.5) ctx.translate(0, shake - 3);

    drawBackground();
    drawGroundAndTrees();
    drawContourLines();

    // 쌓인 블럭
    for (var j = 0; j < blocks.length; j++) {
      var by = worldTop(j) - cameraY;
      if (by > H + 80) continue;
      drawBlock(blocks[j], by);
    }

    // 잘린 조각
    for (var k = 0; k < debris.length; k++) {
      var dd = debris[k];
      ctx.save(); ctx.globalAlpha = 0.85;
      drawBlock(dd, dd.y - cameraY);
      ctx.restore();
    }

    // 떨어지는 블럭
    if (falling) drawBlock(falling, falling.y - cameraY);

    // 움직이는 블럭 (화면 상단 고정)
    if (state === "aiming" && moving) {
      drawBlock(moving, dropTopY());
      // 떨어질 위치 안내선
      ctx.strokeStyle = "rgba(255,255,255,0.5)";
      ctx.lineWidth = 2; ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.moveTo(moving.x + moving.w / 2, dropTopY() + BLOCK_H);
      ctx.lineTo(moving.x + moving.w / 2, worldTop(blocks.length - 1) - cameraY - BLOCK_H);
      ctx.stroke(); ctx.setLineDash([]);
    }

    ctx.restore();

    if (flash > 0) {
      ctx.fillStyle = "rgba(255,255,210," + (flash * 0.4) + ")";
      ctx.fillRect(0, 0, W, H);
      if (perfectStreak > 1) {
        ctx.fillStyle = "rgba(255,130,0," + flash + ")";
        ctx.font = "bold 36px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("딱 맞췄어요! x" + perfectStreak, W / 2, H * 0.32);
        ctx.textAlign = "left";
      }
    }

    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
